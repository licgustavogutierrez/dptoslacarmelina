<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Mapa de imágenes interactivo</title>

<style>
body{
    font-family: Arial;
    text-align:center;
    background:#eef2f3;
}

h1{
    margin:20px;
}

.mapa{
    position:relative;
    width:800px;
    margin:auto;
}

.mapa img{
    width:100%;
    border-radius:10px;
}

/* puntos clicables */
.punto{
    position:absolute;
    width:40px;
    height:40px;
    cursor:pointer;
    transition: transform 0.2s;
}

.punto:hover{
    transform:scale(1.3);
}
</style>
</head>

<body>

<h1>Mapa interactivo</h1>

<div class="mapa">

<img src="https://picsum.photos/800/400" alt="mapa">

<img src="https://cdn-icons-png.flaticon.com/512/684/684908.png"
class="punto" style="top:60px; left:200px;" onclick="mostrar('Zona 1')">

<img src="https://cdn-icons-png.flaticon.com/512/684/684908.png"
class="punto" style="top:150px; left:400px;" onclick="mostrar('Zona 2')">

<img src="https://cdn-icons-png.flaticon.com/512/684/684908.png"
class="punto" style="top:250px; left:600px;" onclick="mostrar('Zona 3')">

</div>

<p id="info"></p>

<script>
function mostrar(zona){
    document.getElementById("info").innerText =
    "Hiciste clic en: " + zona;
}
</script>

</body>
</html>
