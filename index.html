<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Plano interactivo de casa</title>

<style>

body{
    font-family: Arial;
    background:#1e1e2f;
    text-align:center;
    color:white;
}

h1{
    margin:20px;
}

/* contenedor del plano */

.plano{
    position:relative;
    width:800px;
    margin:auto;
}

.plano img{
    width:100%;
    border-radius:10px;
}

/* zonas clicables */

.zona{
    position:absolute;
    border:2px solid rgba(255,255,255,0.4);
    cursor:pointer;
    transition:all 0.3s;
}

/* animación */

.zona:hover{
    background:rgba(255,255,0,0.3);
    transform:scale(1.03);
}

/* panel información */

.info{
    margin-top:20px;
    padding:15px;
    background:#333;
    width:400px;
    margin-left:auto;
    margin-right:auto;
    border-radius:10px;
}

</style>
</head>

<body>

<h1>Plano interactivo</h1>

<div class="plano">

<img src="plano.jpg">

<!-- sala -->
<div class="zona" style="top:50px; left:60px; width:150px;height:150px;"
onclick="mostrar('Cochera','Dispone de dos coches.')"></div>

<!-- cocina -->
<div class="zona" style="top:50px; left:300px; width:200px; height:150px;"
onclick="mostrar('Cocina','Lugar donde se preparan los alimentos.')"></div>

<!-- dormitorio -->
<div class="zona" style="top:220px; left:60px; width:200px; height:150px;"
onclick="mostrar('Dormitorio','Habitación para descansar.')"></div>

<!-- baño -->
<div class="zona" style="top:220px; left:300px; width:120px; height:120px;"
onclick="mostrar('Baño','Espacio para higiene personal.')"></div>

</div>

<div class="info" id="info">
Haz clic en una parte del plano
</div>

<script>

function mostrar(titulo,texto){
document.getElementById("info").innerHTML =
"<h2>"+titulo+"</h2><p>"+texto+"</p>";
}

</script>

</body>
</html>
