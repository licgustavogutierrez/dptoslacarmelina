<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Puntos animados</title>

<style>

body{
    background:#1e1e2f;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

/* contenedor */

.mapa{
    position:relative;
    width:600px;
}

/* imagen */

.mapa img{
    width:100%;
}

/* punto */

.punto{
    position:absolute;
    width:20px;
    height:20px;
    background:red;
    border-radius:50%;
    cursor:pointer;
}

/* animación */

.punto::after{
    content:"";
    position:absolute;
    width:20px;
    height:20px;
    border-radius:50%;
    background:red;
    animation:pulse 1.5s infinite;
}

@keyframes pulse{

0%{
transform:scale(1);
opacity:0.8;
}

70%{
transform:scale(3);
opacity:0;
}

100%{
opacity:0;
}

}

</style>
</head>

<body>

<div class="mapa">

<img src="plano.jpg">

<div class="punto" style="top:110px; left:200px;"></div>
<div class="punto" style="top:110px; left:350px;"></div>
<div class="punto" style="top:110px; left:150px;"></div>

</div>

</body>
</html>
