<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Mapa interactivo</title>

<style>
body{
    font-family: Arial;
    background: linear-gradient(135deg,#2c3e50,#3498db);
    text-align:center;
    color:white;
}

h1{
    margin:20px;
}

.mapa{
    position:relative;
    width:800px;
    margin:auto;
}

.mapa img{
    width:100%;
    border-radius:10px;
}

/* puntos del mapa */

.punto{
    position:absolute;
    width:30px;
    height:30px;
    background:red;
    border-radius:50%;
    cursor:pointer;
    animation:pulsar 1.5s infinite;
}

@keyframes pulsar{
    0%{transform:scale(1)}
    50%{transform:scale(1.3)}
    100%{transform:scale(1)}
}

/* panel de información */

.info{
    margin-top:20px;
    padding:15px;
    background:rgba(0,0,0,0.5);
    width:400px;
    margin-left:auto;
    margin-right:auto;
    border-radius:10px;
    transition:all 0.4s;
}

</style>
</head>

<body>

<h1>Mapa interactivo</h1>

<div class="mapa">

<img src="plano.jpg" alt="mapa">

<div class="punto" style="top:80px; left:200px;" onclick="mostrar('Ciudad 1','Información de la ciudad 1')"></div>

<div class="punto" style="top:200px; left:400px;" onclick="mostrar('Ciudad 2','Información de la ciudad 2')"></div>

<div class="punto" style="top:300px; left:600px;" onclick="mostrar('Ciudad 3','Información de la ciudad 3')"></div>

</div>

<div class="info" id="info">
Haz clic en un punto del mapa
</div>

<script>

function mostrar(titulo,texto){

document.getElementById("info").innerHTML =
"<h2>"+titulo+"</h2><p>"+texto+"</p>";

}

</script>

</body>
</html>
