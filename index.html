<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Goliat Construye</title>

<style>

body{
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#1e293b,#0f172a);
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    height:100vh;
    margin:0;
}

/* titulo */

.titulo{
    color:white;
    font-size:45px;
    margin-bottom:30px;
    text-shadow:0 5px 15px rgba(0,0,0,0.5);
}

/* carrusel */

.carrusel{
    position:relative;
    width:650px;
    height:380px;
    overflow:hidden;
    border-radius:12px;
    box-shadow:0 10px 30px rgba(0,0,0,0.5);
}

/* imagenes */

.carrusel img{
    position:absolute;
    width:100%;
    height:100%;
    object-fit:cover;
    opacity:0;
    transition:opacity 1s;
}

.carrusel img.activa{
    opacity:1;
}

/* botones */

.boton{
    position:absolute;
    top:50%;
    transform:translateY(-50%);
    background:rgba(0,0,0,0.4);
    color:white;
    border:none;
    font-size:28px;
    padding:10px 15px;
    cursor:pointer;
    border-radius:5px;
}

.prev{
    left:10px;
}

.next{
    right:10px;
}

.boton:hover{
    background:rgba(0,0,0,0.7);
}

</style>
</head>

<body>

<h1 class="titulo">Dptos en La Carmelina</h1>

<div class="carrusel">
<img src="cochera.jpg" class="activa">
<img src="patio.jpg">
<img src="patio1.jpg">
<img src="living.jpg">
<img src="comedor.jpg">   
<img src="cocina1.jpg">
    <img src="baño.jpg">
    <img src="dormitorio1.jpg">
    <img src="dormitorio2.jpg">

<button class="boton prev" onclick="anterior()">❮</button>
<button class="boton next" onclick="siguiente()">❯</button>

</div>

<script>

let index = 0;
const imagenes = document.querySelectorAll(".carrusel img");

function mostrar(){
imagenes.forEach(img => img.classList.remove("activa"));
imagenes[index].classList.add("activa");
}

function siguiente(){
index++;
if(index >= imagenes.length) index = 0;
mostrar();
}

function anterior(){
index--;
if(index < 0) index = imagenes.length - 1;
mostrar();
}

setInterval(siguiente,4000);

</script>

</body>
</html>
