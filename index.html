<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Dptos La Carmelina</title>

<style>





    

    
body{
    background:#1e1e2f;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

/* contenedor */

.mapa{
    position:relative;
    width:600px;
}

/* imagen */

.mapa img{
    width:100%;
}

/* punto */

.punto{
    position:absolute;
    width:20px;
    height:20px;
    background:red;
    border-radius:50%;
    cursor:pointer;
}

/* animación */

.punto::after{
    content:"";
    position:absolute;
    width:20px;
    height:20px;
    border-radius:50%;
    background:red;
    animation:pulse 1.5s infinite;
}

@keyframes pulse{

0%{
transform:scale(1);
opacity:0.8;
}

70%{
transform:scale(3);
opacity:0;
}

100%{
opacity:0;
}

}


.titulo{
    font-family: Arial, sans-serif;
    font-size:50px;
    color:#ffffff;
    text-align:center;
    animation:brillo 3s infinite alternate;
}

/* animación de sombra */

@keyframes brillo{

0%{
text-shadow:
0 0 5px #fff,
0 0 10px #4facfe,
0 0 20px #4facfe;
}

100%{
text-shadow:
0 0 15px #fff,
0 0 30px #00f2fe,
0 0 60px #00f2fe;
}

}






    
</style>
</head>

<body>

<div class="mapa">
<h1 class="titulo">Departamentos en La Carmelina</h1>
    
<img src="plano.jpg">

<div class="punto" style="top:100px; left:100px;"></div>
<div class="punto" style="top:100px; left:250px;"></div>
<div class="punto" style="top:100px; left:320px;"></div>

</div>

</body>
</html>
