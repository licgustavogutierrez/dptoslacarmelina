<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Goliat Construye</title>

<style>

body{
margin:0;
font-family:Arial;
background:#141414;
color:white;
}

/* barra superior */

.header{
display:flex;
align-items:center;
padding:15px 30px;
background:#000;
}

.logo{
font-size:28px;
color:red;
font-weight:bold;
margin-right:40px;
}

.menu a{
color:white;
margin-right:20px;
text-decoration:none;
font-size:16px;
}

/* portada */

.hero{
height:70vh;
/*background: img src:carmelin.jpg;
background-image: url("")  center/cover no-repeat;*/
/*background:url("https://github.com/licgustavogutierrez/dptoslacarmelina/blob/main/carmelina.jpg") center/cover no-repeat;*/
background: url("carmelina.jpg")   center/cover no-repeat;  
display:flex;
flex-direction:column;
justify-content:center;
padding-left:60px;
}

.hero h1{
font-size:60px;
}

.hero p{
width:400px;
margin-top:10px;
}

.hero button{
margin-top:15px;
padding:10px 20px;
border:none;
font-size:18px;
cursor:pointer;
margin-right:10px;
}

/* filas */

.titulo{
margin:20px 30px;
font-size:24px;
}

.fila{
display:flex;
overflow-x:auto;
padding:20px;
}

.fila::-webkit-scrollbar{
display:none;
}

/* tarjetas */

.card{
min-width:220px;
margin-right:10px;
transition:transform 0.3s;
}

.card img{
width:100%;
border-radius:6px;
}

.card:hover{
transform:scale(1.1);
}

</style>
</head>

<body>

<div class="menu">

</div>

<div>

</div>
</div>
