<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Carrusel estilo Netflix</title>

<style>

body{
    margin:0;
    font-family:Arial;
    background:#141414;
    color:white;
}

/* titulo */

.titulo{
    font-size:30px;
    margin:20px;
}

/* contenedor */

.contenedor{
    position:relative;
}

/* fila */

.fila{
    display:flex;
    overflow-x:auto;
    scroll-behavior:smooth;
    padding:20px;
}

.fila::-webkit-scrollbar{
    display:none;
}

/* tarjetas */

.card{
    min-width:220px;
    margin-right:10px;
    transition:transform 0.3s;
}

.card img{
    width:100%;
    border-radius:6px;
}

.card:hover{
    transform:scale(1.1);
}

/* botones */

.boton{
    position:absolute;
    top:40%;
    background:rgba(0,0,0,0.7);
    border:none;
    color:white;
    font-size:30px;
    padding:10px;
    cursor:pointer;
}

.izq{
    left:0;
}

.der{
    right:0;
}

</style>
</head>

<body>

<h2 class="titulo">Departamentos en la Carmelina</h2>

<div class="contenedor">

<button class="boton izq" onclick="scrollIzq()">❮</button>

<div class="fila" id="fila">





   

    
    
    
<div class="card"><img src="cochera.jpg" class="activa"></div>
<div class="card"><img src="patio.jpg"></div>
<div class="card"><img src="patio1.jpg"></div>
<div class="card"><img src="living.jpg"></div>
<div class="card"><img src="comedor.jpg"></div>
<div class="card"><img src="cocina1.jpg"></div>
<div class="card"><img src="baño.jpg"></div>
 <div class="card">  <img src="dormitorio1.jpg"></div>
    <div class="card"><img src="dormitorio2.jpg"></div>

</div>

<button class="boton der" onclick="scrollDer()">❯</button>

</div>

<script>

const fila=document.getElementById("fila");

function scrollDer(){
    fila.scrollLeft += 300;
}

function scrollIzq(){
    fila.scrollLeft -= 300;
}

</script>

</body>
</html>
