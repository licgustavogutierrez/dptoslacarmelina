<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Haz clic en las imágenes</title>

<style>
body{
    font-family: Arial;
    text-align:center;
    background:#f0f0f0;
}

h1{
    margin-top:20px;
}

#puntos{
    font-size:24px;
    margin:20px;
}

.galeria{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:20px;
}

img{
    width:150px;
    height:150px;
    cursor:pointer;
    border-radius:10px;
    transition:transform 0.2s;
}

img:hover{
    transform:scale(1.1);
}
</style>
</head>

<body>

<h1>Haz clic en las imágenes</h1>

<div id="puntos">Puntos: 0</div>

<div class="galeria">

<img src="https://picsum.photos/200?1" onclick="sumar()">
<img src="https://picsum.photos/200?2" onclick="sumar()">
<img src="https://picsum.photos/200?3" onclick="sumar()">
<img src="https://picsum.photos/200?4" onclick="sumar()">
<img src="https://picsum.photos/200?5" onclick="sumar()">
<img src="https://picsum.photos/200?6" onclick="sumar()">

</div>

<script>
let puntos = 0;

function sumar(){
    puntos++;
    document.getElementById("puntos").innerText = "Puntos: " + puntos;
}
</script>

</body>
</html>
