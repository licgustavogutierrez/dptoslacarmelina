<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Goliat Construye</title>

<style>

body{
    font-family: Arial;
    background:#111;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

/* contenedor */

.carrusel{
    position:relative;
    margin-top:100px;
    width:600px;
    height:350px;
    overflow:hidden;
    border-radius:10px;
}

/* imágenes */

.carrusel img{
    width:100%;
    height:100%;
    object-fit:cover;
    position:absolute;
    opacity:0;
    transition:opacity 1s;
}

.carrusel img.activa{
    opacity:1;
}

/* botones */

.boton{
    position:absolute;
    top:50%;
    transform:translateY(-50%);
    background:rgba(0,0,0,0.5);
    color:white;
    border:none;
    font-size:25px;
    padding:10px;
    cursor:pointer;
}

.prev{
    left:10px;
}

.next{
    right:10px;
}


.titulo{
    font-family: Arial, sans-serif;
    font-size:30px;
    margin-top:10px;
    color:white;
    text-align:center;

    text-shadow:
    3px 3px 6px rgba(0,0,0,0.6),
    0 0 10px rgba(255,255,255,0.4);
}






    
</style>

</head>

<body>
    
<h4 class="titulo">Dptos en la Carmelina Club de Campo</h4>
<div class="carrusel">

<img src="cochera.jpg" class="activa">
<img src="patio.jpg">
<img src="patio1.jpg">
<img src="living.jpg">
<img src="comedor.jpg">   
<img src="cocina1.jpg">
    <img src="baño.jpg">
    <img src="dormitorio1.jpg">
    <img src="dormitorio2.jpg">

<button class="boton prev" onclick="anterior()">❮</button>
<button class="boton next" onclick="siguiente()">❯</button>

</div>

<script>

let index = 0;
const imagenes = document.querySelectorAll(".carrusel img");

function mostrarImagen(){
imagenes.forEach(img => img.classList.remove("activa"));
imagenes[index].classList.add("activa");
}

function siguiente(){
index++;
if(index >= imagenes.length) index = 0;
mostrarImagen();
}

function anterior(){
index--;
if(index < 0) index = imagenes.length - 1;
mostrarImagen();
}

/* cambio automático */

setInterval(siguiente,3000);

</script>

</body>
</html>
