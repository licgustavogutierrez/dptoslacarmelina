<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Plano interactivo de una casa</title>

<style>

body{
    font-family: Arial;
    background: linear-gradient(135deg,#4facfe,#00f2fe);
    text-align:center;
    color:white;
}

h1{
    margin:20px;
}

/* plano */

.plano{
    width:600px;
    height:400px;
    margin:auto;
    position:relative;
    background:#eee;
    border:5px solid #333;
}

/* habitaciones */

.habitacion{
    position:absolute;
    border:2px solid #333;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    font-weight:bold;
    color:#333;
    transition:all 0.3s;
}

/* animacion */

.habitacion:hover{
    background:#ffd54f;
    transform:scale(1.05);
}

/* habitaciones posiciones */

.sala{
    width:300px;
    height:200px;
    top:0;
    left:0;
    background:#c8e6c9;
}

.cocina{
    width:300px;
    height:200px;
    top:0;
    right:0;
    background:#ffe0b2;
}

.dormitorio{
    width:300px;
    height:200px;
    bottom:0;
    left:0;
    background:#bbdefb;
}

.baño{
    width:300px;
    height:200px;
    bottom:0;
    right:0;
    background:#f8bbd0;
}

/* panel info */

.info{
    margin-top:20px;
    background:rgba(0,0,0,0.4);
    padding:15px;
    width:400px;
    margin-left:auto;
    margin-right:auto;
    border-radius:10px;
}

</style>
</head>

<body>

<h1>Plano interactivo de una casa</h1>

<div class="plano">

<div class="habitacion sala" onclick="mostrar('Sala','Lugar para descansar y ver televisión.')">
Sala
</div>

<div class="habitacion cocina" onclick="mostrar('Cocina','Lugar donde se preparan los alimentos.')">
Cocina
</div>

<div class="habitacion dormitorio" onclick="mostrar('Dormitorio','Habitación para dormir y descansar.')">
Dormitorio
</div>

<div class="habitacion baño" onclick="mostrar('Baño','Lugar para higiene personal.')">
Baño
</div>

</div>

<div class="info" id="info">
Haz clic en una habitación del plano
</div>

<script>

function mostrar(titulo,texto){

document.getElementById("info").innerHTML =
"<h2>"+titulo+"</h2><p>"+texto+"</p>";

}

</script>

</body>
</html>
